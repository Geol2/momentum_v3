<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2450"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.38" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c9d6ff"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- night tile -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#3a4a8a" stroke-opacity="0.5" stroke-width="1"/>

  <!-- crescent moon (big disc minus offset disc) -->
  <g filter="url(#glow)">
    <path d="M41 15 a17 17 0 1 0 8 30 a13 13 0 1 1 -8 -30 z" fill="url(#moon)"/>
  </g>

  <!-- stars -->
  <g fill="#eaf0ff">
    <circle cx="20" cy="20" r="1.6"/>
    <circle cx="15" cy="40" r="1.2"/>
    <circle cx="27" cy="48" r="1.4"/>
    <path d="M46 46 l1.3 3 l3 1.3 l-3 1.3 l-1.3 3 l-1.3 -3 l-3 -1.3 l3 -1.3 z" opacity="0.9"/>
  </g>
</svg>
